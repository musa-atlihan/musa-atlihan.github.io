<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="top-nav" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark">MA</span>
          <span>{{ site.title }}</span>
        </a>
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/blog/' | relative_url }}" {% if page.url == '/blog/' %}aria-current="page"{% endif %}>Blog</a>
          <a href="https://github.com/musa-atlihan">GitHub</a>
        </div>
      </nav>
    </header>

    <div class="site-shell">
      <aside class="profile-sidebar" aria-label="Profile">
        <section class="profile-panel">
          <img class="avatar" src="https://github.com/musa-atlihan.png" alt="Musa Atlıhan GitHub avatar">
          <h2>Musa Atlıhan</h2>
          <nav class="profile-links" aria-label="Contact links">
            <a href="https://github.com/musa-atlihan/musa-atlihan.github.io">GitHub repo</a>
            <a href="mailto:msatlihan@gmail.com">msatlihan@gmail.com</a>
            <a href="https://linkedin.com/in/musa-atlihan">LinkedIn</a>
          </nav>
        </section>
      </aside>

      <main class="content" id="main-content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
